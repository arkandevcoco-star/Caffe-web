<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
     <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css" integrity="sha384-CfCrinSRH2IR6a4e6fy2q6ioOX7O6Mtm1L9vRvFZ1trBncWmMePhzvafv7oIcWiW" crossorigin="anonymous">

    <title>Minimarket-cli</title>
  </head>
  <body>
    <header class="border header">
      <h1 class="text-center pt-3">Welcome in Nganjuk Cafe </h1>
    </header>
    <div>
      <div class="menu p-5 m-5">
        <h2 class="text-center"><img src="IMG/coffee-icon-svgrepo-com.svg" width="50px" alt=""> MENU</h2>
        <div class="container">
          <div class="row d-flex justify-content-between">
            <div class="col">Expresso</div>
            <div class="col-auto">:</div>
            <div class="col">Rp 10.000</div>
          </div>
          <div class="row d-flex justify-content-between">
            <div class="col">Americano</div>
            <div class="col-auto">:</div>
            <div class="col">Rp 12.000</div>
          </div>
          <div class="row d-flex justify-content-between">
            <div class="col">Cafe Latte</div>
            <div class="col-auto">:</div>
            <div class="col">Rp 14.000</div>
          </div>
          <div class="row d-flex justify-content-between">
            <div class="col">Cappuccino</div>
            <div class="col-auto">:</div>
            <div class="col">Rp 16.000</div>
          </div>
          <div class="row d-flex justify-content-between">
            <div class="col">Flat White</div>
            <div class="col-auto">:</div>
            <div class="col">Rp 13.000</div>
          </div>
          <div class="row d-flex justify-content-between">
            <div class="col">Machiato</div>
            <div class="col-auto">:</div>
            <div class="col">Rp 14.000</div>
          </div>
        </div>
          
        </div>
    </div>
    <div class="pesan p-4 mb-4">
      <form action="" class="">
        <div class="mb-3">
          <label for="name" class="form-label">😀Name</label>
          <input  id="nama-pemesan" type="name" class="form-control" required>
      </div>
      <div class="mb-3">
  <label for="pilihan1" class="form-label">☕Select your coffee order.</label>
  <select required class="form-select" id="pilihan1" aria-label="Default select example">
    <option selected value="0">Menu</option>
    <option value="Expresso">Expresso</option>
    <option value="Americano">Americano</option>
    <option value="Caffe Latte">Caffe Latte</option>
    <option value="Cappuccino">Cappuccino</option>
    <option value="Flat White">Flat White</option>
    <option value="Machiato">Machiato</option>
  </select>
  <button
    id="Order-btn"
    class="btn btn-success mt-4 "
    onclick="Order()"
    type="button"
    >ORDER!</button>
</div>
      </form>
    </div>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>



    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

  </body>
</html>
